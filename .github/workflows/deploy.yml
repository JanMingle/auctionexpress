name: Deploy Auction Express via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Upload to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /domains/auctionexpress.club/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            config/db.php
            db.php
            .env
            uploads/**
            __debug_500.log
            __student_debug_500.log
